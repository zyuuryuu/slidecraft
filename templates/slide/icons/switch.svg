<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Switch: Rectangle with four single arrows pointing outward -->
  <!-- Central rectangle -->
  <rect x="20" y="26" width="24" height="14" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top arrow (pointing up) -->
