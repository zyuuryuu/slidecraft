  <!-- Bottom arrow (pointing down) -->
  <path d="M 32 50 L 32 40 M 28 46 L 32 50 L 36 46" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left arrow (pointing left) -->
  <path d="M 8 32 L 20 32 M 12 28 L 8 32 L 12 36" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arrow (pointing right) -->
