<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Firewall: Brick wall with 2 rows and simplified brick pattern -->
  <!-- Main rectangle -->
  <rect x="12" y="14" width="40" height="36" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Horizontal divider lines (creating 3 rows) -->
  <line x1="12" y1="27" x2="52" y2="27" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="12" y1="40" x2="52" y2="40" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertical lines for first row -->
  <line x1="24" y1="14" x2="24" y2="27" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="40" y1="14" x2="40" y2="27" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Offset vertical lines for second row (brick pattern offset) -->
  <line x1="18" y1="27" x2="18" y2="40" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="32" y1="27" x2="32" y2="40" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="46" y1="27" x2="46" y2="40" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
