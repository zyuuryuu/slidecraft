name: SBOM

# Generate a CycloneDX Software Bill of Materials for both the JS app and the
# Rust/Tauri backend, uploaded as build artifacts (90-day retention). Run locally
# for just the JS side with `npm run sbom`.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-npm.cdx.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-cyclonedx
      - name: cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: cargo cyclonedx --format json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom-npm.cdx.json
            src-tauri/*.cdx.json
          retention-days: 90
