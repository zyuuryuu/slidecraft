name: SBOM

# Generate a CycloneDX Software Bill of Materials for both the JS app and the
# Rust/Tauri backend, uploaded as build artifacts (90-day retention). Run locally
# for just the JS side with `npm run sbom`.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-npm.cdx.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-cyclonedx
      - name: cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: cargo cyclonedx --format json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: |
            sbom-npm.cdx.json
            src-tauri/*.cdx.json
          retention-days: 90
