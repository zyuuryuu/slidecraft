name: SBOM

# Generate a CycloneDX Software Bill of Materials for both the JS app and the
# Rust/Tauri backend, uploaded as build artifacts (90-day retention). Run locally
# for just the JS side with `npm run sbom`.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-npm.cdx.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-cyclonedx
      - name: cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: cargo cyclonedx --format json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom-npm.cdx.json
            src-tauri/*.cdx.json
          retention-days: 90
