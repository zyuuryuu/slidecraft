name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# installers for all OSes and attach them to a DRAFT GitHub Release for review.
# Manual runs (workflow_dispatch) build against the current ref for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # create/update the GitHub Release + upload installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64 runner)
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          # Intel — MUST run on an Intel runner: stage-llamafile `--assimilate`s host-native, so an
          # arm64 runner would emit an arm64 llamafile into the x64 bundle.
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            triple: x86_64-apple-darwin
          - platform: ubuntu-latest # .deb + .AppImage
            args: ""
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest # .msi + .exe (NSIS)
            args: ""
            triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf

      - run: npm ci

      # Stage the Node runtime as the externalBin sidecar for THIS matrix target. Must precede
      # tauri-action: Tauri validates externalBin existence at build time. (Bundles the collab host.)
      - name: Stage Node sidecar (externalBin)
        run: node scripts/stage-node.mjs ${{ matrix.triple }}

      # Stage the llamafile runtime (in-app offline AI). Assimilates the APE to the runner's native
      # format on its own OS (matrix runner OS == triple OS), so it's runnable + codesignable.
      - name: Stage llamafile sidecar (externalBin)
        run: node scripts/stage-llamafile.mjs ${{ matrix.triple }}

      # Ad-hoc sign the bundled child binaries BEFORE Tauri packages them (inside-out signing order).
      # The app SPAWNS node + llamafile as separate processes; on Apple Silicon the kernel refuses to
      # exec an UNSIGNED binary ("killed: 9"), so each sidecar needs its own signature — the outer
      # app's signature does not cover child processes. `-s -` is ad-hoc (FREE, no Apple account); we
      # deliberately DO NOT pass `--options runtime` (hardened runtime) because llamafile JITs its
      # GGML kernels and hardened runtime would block executable memory. Distribution is via a
      # Homebrew cask, which strips com.apple.quarantine on install, so notarization is not required.
      - name: Ad-hoc sign bundled sidecars (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          codesign --force --sign - "src-tauri/binaries/node-${{ matrix.triple }}"
          codesign --force --sign - "src-tauri/binaries/llamafile-${{ matrix.triple }}"
          codesign --verify --verbose "src-tauri/binaries/node-${{ matrix.triple }}"
          codesign --verify --verbose "src-tauri/binaries/llamafile-${{ matrix.triple }}"

      # tauri-action runs the tauri.conf beforeBuildCommand (npm run build && npm run build:host).
      # `--config` applies the release-only overlay (externalBin node + host.cjs resource + macOS
      # ad-hoc signing) so the PACKAGED collab + offline AI work; the overlay is kept out of the base
      # config so `tauri dev` needs no staged node/signing. macOS: the overlay sets
      # macOS.signingIdentity="-" (ad-hoc) + hardenedRuntime=false, so Tauri signs the .app itself and
      # the already-signed sidecars are sealed inside it. Not notarized — install via `brew` cask.
      - name: Build + publish (draft release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SlideCraft v__VERSION__"
          releaseBody: "Download the installer for your OS below. macOS is ad-hoc signed (not notarized) — install via `brew install --cask zyuuryuu/slidecraft/slidecraft` for a clean first run, or right-click → Open on a direct .dmg download. See README for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.bundle.conf.json
