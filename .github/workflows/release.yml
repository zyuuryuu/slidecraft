name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# installers for all OSes and attach them to a DRAFT GitHub Release for review.
# Manual runs (workflow_dispatch) build against the current ref for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # create/update the GitHub Release + upload installers
      attestations: write # actions/attest-build-provenance
      id-token: write # OIDC token consumed by attest-build-provenance to sign attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: Apple Silicon (arm64) only. Intel Mac installers were dropped (#112) — CI
          # runner availability made the x64 job unreliable enough that it wasn't worth carrying;
          # Intel users build from source instead (see README / docs/guide/installation.md).
          - platform: macos-latest # Apple Silicon (arm64 runner)
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          - platform: ubuntu-latest # .deb + .AppImage
            args: ""
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest # .msi + .exe (NSIS)
            args: ""
            triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf

      - run: npm ci

      # Stage the Node runtime as the externalBin sidecar for THIS matrix target. Must precede
      # tauri-action: Tauri validates externalBin existence at build time. (Bundles the collab host.)
      - name: Stage Node sidecar (externalBin)
        run: node scripts/stage-node.mjs ${{ matrix.triple }}

      # Stage the llamafile runtime (in-app offline AI). Assimilates the APE to the runner's native
      # format on its own OS (matrix runner OS == triple OS), so it's runnable + codesignable.
      - name: Stage llamafile sidecar (externalBin)
        run: node scripts/stage-llamafile.mjs ${{ matrix.triple }}

      # Ad-hoc sign the bundled child binaries BEFORE Tauri packages them (inside-out signing order).
      # The app SPAWNS node + llamafile as separate processes; on Apple Silicon the kernel refuses to
      # exec an UNSIGNED binary ("killed: 9"), so each sidecar needs its own signature — the outer
      # app's signature does not cover child processes. `-s -` is ad-hoc (FREE, no Apple account); we
      # deliberately DO NOT pass `--options runtime` (hardened runtime) because llamafile JITs its
      # GGML kernels and hardened runtime would block executable memory. Distribution is via a
      # Homebrew cask, which strips com.apple.quarantine on install, so notarization is not required.
      - name: Ad-hoc sign bundled sidecars (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          codesign --force --sign - "src-tauri/binaries/node-${{ matrix.triple }}"
          codesign --force --sign - "src-tauri/binaries/llamafile-${{ matrix.triple }}"
          codesign --verify --verbose "src-tauri/binaries/node-${{ matrix.triple }}"
          codesign --verify --verbose "src-tauri/binaries/llamafile-${{ matrix.triple }}"

      # Release notes = the tagged version's own CHANGELOG.md section (Keep a Changelog headings,
      # "## [x.y.z] - date" through the next heading), not a fixed string that never reflected the
      # actual per-version changes (#258). On a real tag push a missing/empty section is a hard
      # error (forces CHANGELOG.md discipline before tagging); workflow_dispatch test runs build an
      # arbitrary ref that isn't a tagged entry, so they fall back to an explicit placeholder
      # instead of failing the test build.
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            body="$(node scripts/extract-changelog-section.mjs "${{ github.ref_name }}")"
          else
            body="$(node scripts/extract-changelog-section.mjs "${{ github.ref_name }}" --allow-missing)"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$body"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # tauri-action runs the tauri.conf beforeBuildCommand (npm run build && npm run build:host).
      # `--config` applies the release-only overlay (externalBin node + host.cjs resource + macOS
      # ad-hoc signing) so the PACKAGED collab + offline AI work; the overlay is kept out of the base
      # config so `tauri dev` needs no staged node/signing. macOS: the overlay sets
      # macOS.signingIdentity="-" (ad-hoc) + hardenedRuntime=false, so Tauri signs the .app itself and
      # the already-signed sidecars are sealed inside it. Not notarized — install via `brew` cask.
      - name: Build + publish (draft release)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SlideCraft v__VERSION__"
          releaseBody: |
            ${{ steps.changelog.outputs.body }}

            ---

            Download the installer for your OS below. macOS is ad-hoc signed (not notarized) — install via `brew install --cask zyuuryuu/slidecraft/slidecraft` for a clean first run, or right-click → Open on a direct .dmg download (Apple Silicon only; Intel Macs build from source). SHA256SUMS, SBOM, and build provenance attestations are attached below. See README for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.bundle.conf.json

      # Provenance attestation for the installers this job just built (#257) — ties each artifact
      # back to this workflow run/commit via the GitHub attestations API (`gh attestation verify`).
      # Split per-OS because subject-path globs that match zero files make the action fail.
      - name: Attest build provenance (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: src-tauri/target/**/release/bundle/dmg/*.dmg

      - name: Attest build provenance (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm

      - name: Attest build provenance (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe

  checksums-and-sbom:
    name: SHA256SUMS + SBOM
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload SHA256SUMS + SBOM as release assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom-npm.cdx.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-cyclonedx
      - name: cargo SBOM (CycloneDX)
        working-directory: src-tauri
        run: cargo cyclonedx --format json

      # SHA256SUMS covers only the installers (downloaded fresh into dist/), computed BEFORE the
      # SBOM files are added anywhere near dist/ so it stays a checksum of the shipped binaries.
      - name: Download release installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pattern-filtered so a re-run for the same tag doesn't fold a leftover SHA256SUMS/SBOM
        # asset from a prior attempt back into the new checksum file.
        run: |
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" --dir dist \
            -p '*.dmg' -p '*.msi' -p '*.exe' -p '*.AppImage' -p '*.deb' -p '*.rpm'

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Upload SHA256SUMS + SBOM to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/SHA256SUMS sbom-npm.cdx.json src-tauri/*.cdx.json \
            --repo "${{ github.repository }}" --clobber

      # Never-silent gate for #287: `npm run version:set` bumps the cask's `version` but not its
      # `sha256` (that can only be computed once the .dmg exists), leaving a window where the cask
      # in this repo can point at the WRONG binary if update-cask.mjs was never run/committed for
      # this tag. Only meaningful on a real tag push — workflow_dispatch test builds aren't tied to
      # a released cask version. Runs before a human publishes the draft release.
      - name: Verify Homebrew cask sha256 matches the published dmg
        if: github.ref_type == 'tag'
        run: node scripts/verify-cask.mjs "${{ github.ref_name }}" dist/SHA256SUMS
