name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# installers for all OSes and attach them to a DRAFT GitHub Release for review.
# Manual runs (workflow_dispatch) build against the current ref for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # create/update the GitHub Release + upload installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
            triple: x86_64-apple-darwin
          - platform: ubuntu-latest # .deb + .AppImage
            args: ""
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest # .msi + .exe (NSIS)
            args: ""
            triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf

      - run: npm ci

      # Stage the Node runtime as the externalBin sidecar for THIS matrix target. Must precede
      # tauri-action: Tauri validates externalBin existence at build time. (Bundles the collab host.)
      - name: Stage Node sidecar (externalBin)
        run: node scripts/stage-node.mjs ${{ matrix.triple }}

      # tauri-action runs the tauri.conf beforeBuildCommand (npm run build && npm run build:host).
      # `--config` applies the release-only overlay (externalBin node + host.cjs resource) so the
      # PACKAGED collab works; the overlay is kept out of the base config so `tauri dev` needs no
      # staged node. (macOS: unsigned for now — the bundled node may need ad-hoc/Developer-ID signing
      # to avoid a Gatekeeper "killed: 9"; tracked as the remaining mac sub-task.)
      - name: Build + publish (draft release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SlideCraft v__VERSION__"
          releaseBody: "Download the installer for your OS below. (Unsigned — see README for first-run notes.)"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.bundle.conf.json
