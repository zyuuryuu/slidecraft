name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# installers for all OSes and attach them to a DRAFT GitHub Release for review.
# Manual runs (workflow_dispatch) build against the current ref for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # create/update the GitHub Release + upload installers
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest # .deb + .AppImage
            args: ""
          - platform: windows-latest # .msi + .exe (NSIS)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf

      - run: npm ci

      # tauri-action runs the tauri.conf beforeBuildCommand (npm run build) itself.
      - name: Build + publish (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SlideCraft v__VERSION__"
          releaseBody: "Download the installer for your OS below. (Unsigned — see README for first-run notes.)"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
