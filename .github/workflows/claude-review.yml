name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the SlideCraft project.
            Refer to CLAUDE.md for project rules and conventions.

            Check:
            1. R1: Files must be under 400 lines
            2. R2: src/engine/ must be pure logic (no DOM/Tauri API)
            3. R3: New features should have tests
            4. R4: schema.ts changes need careful review
            5. TypeScript: no `any` type abuse, no @ts-ignore
            6. OOXML: never hardcode font/size/color in lstStyle (see REVIEW.md)
            7. Security: no hardcoded secrets or API keys

            Post findings as review comments on specific lines.
            Approve if no issues, request changes if there are problems.
          claude_args: "--max-turns 5"
