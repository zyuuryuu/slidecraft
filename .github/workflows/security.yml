name: Security audit

# Surfaces known-vulnerable dependencies. npm-audit is now REQUIRED (M2/ADR-0016 F4): the high+
# advisories were triaged and resolved via non-breaking `npm audit fix` (2026-07-07), so `npm audit
# --audit-level=high` passes today and BLOCKS on any future high. One dev-only LOW remains (esbuild
# dev-server file-read on Windows — not reachable in the packaged app; fixing needs a breaking esbuild
# bump), which is below the `high` threshold. cargo-audit stays informational until its advisories are
# triaged the same way.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high and above — REQUIRED, blocks on any high+)
        run: npm audit --audit-level=high

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2
        with:
          tool: cargo-audit
      - name: cargo audit (src-tauri)
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
