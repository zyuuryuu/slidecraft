name: Security audit

# Surfaces known-vulnerable dependencies AND committed secrets/keys. npm-audit is REQUIRED (M2/
# ADR-0016 F4) but scoped to PRODUCTION deps (`--omit=dev`) — the gate blocks on any vuln that SHIPS in
# the app, and ignores dev-only tooling (vitepress/vite dev-server, esbuild dev-server, etc.) that never
# reaches an end user. The prod-only high+ set was triaged/resolved via non-breaking `npm audit fix`
# (2026-07-07). cargo-audit stays informational until triaged. secret-scan (gitleaks) blocks on any
# leaked credential/private key — a defense-in-depth guard so a signing key/token can never be committed
# (the Windows signing key itself lives only in SignPath's HSM; cf. CODE_SIGNING_POLICY.md).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit — PRODUCTION deps, high and above (REQUIRED, blocks on any shipped high+)
        run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit
      - name: cargo audit (src-tauri)
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip
      - name: gitleaks — scan for committed secrets / private keys (REQUIRED, blocks on any leak)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v2 (free for public repos)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Honors the repo's .gitleaks.toml (default rules + a tight allowlist for test fixtures).
