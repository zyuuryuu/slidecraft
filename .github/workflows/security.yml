name: Security audit

# Surfaces known-vulnerable dependencies. npm-audit is REQUIRED (M2/ADR-0016 F4) but scoped to
# PRODUCTION deps (`--omit=dev`) — the gate blocks on any vuln that SHIPS in the app, and ignores
# dev-only tooling (vitepress/vite dev-server, esbuild dev-server, etc.) that never reaches an end user.
# The prod-only high+ set was triaged/resolved via non-breaking `npm audit fix` (2026-07-07), so it
# passes today and blocks on any future SHIPPED high. cargo-audit stays informational until triaged.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit — PRODUCTION deps, high and above (REQUIRED, blocks on any shipped high+)
        run: npm audit --omit=dev --audit-level=high

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-audit
      - name: cargo audit (src-tauri)
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
