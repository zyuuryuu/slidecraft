name: CI — Test & Build

# Lightened for CI minutes (M1): push/PR runs Linux-only (test + e2e + a compile smoke). The full
# cross-OS INSTALLER matrix (mac arm64 + Intel, Windows, Linux) is release.yml on a `v*` tag /
# workflow_dispatch — NOT per-push. The old per-push 3-OS build was the drain (macOS bills ×10,
# Windows ×2). Docs-only changes skip CI (paths-ignore).
on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**", "LICENSE", "NOTICE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**", "LICENSE", "NOTICE"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests + type gates + lint (fast, Linux) ─────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # The app build (tsc -b) EXCLUDES src/mcp; typecheck:mcp is its own gate — CI must run it or an
      # MCP-layer type error passes `npm test` AND `npm run build` (see feedback_build_typechecks_tests_dont).
      - run: npm run typecheck:mcp
      - run: npm run lint

  # ── E2E tests (Playwright, Linux) ────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Linux compile smoke ──────────────────────────────────────
  # Catches Rust / tauri-config breaks on PR without the expensive mac/Windows legs. The real
  # cross-OS installers are built in release.yml on a `v*` tag. (rust-cache is a future speedup —
  # skipped here to keep every Action SHA-pinned per the repo's security posture.)
  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf
      - run: npm ci
      - run: npm run build
      - name: Build Tauri app (Linux smoke — installers are release.yml)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
