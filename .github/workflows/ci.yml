name: CI — Test & Build

# Lightened for CI minutes (M1): push/PR runs Linux-only (test + e2e + a compile smoke). The full
# cross-OS INSTALLER matrix (mac arm64, Windows, Linux) is release.yml on a `v*` tag /
# workflow_dispatch — NOT per-push. The old per-push 3-OS build was the drain (macOS bills ×10, Windows ×2).
#
# NO workflow-level paths-ignore: `test` is a REQUIRED status check (branch ruleset on main), and a
# workflow-level paths-ignore would skip the whole workflow on a docs-only PR → the required check never
# reports → the PR is un-mergeable (deadlock). Instead `test` runs always (it's fast), and the heavy jobs
# (e2e, build) skip docs-only pushes via the `changes` job below — preserving CI minutes without deadlock.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect docs-only changes (so e2e/build can skip them without skipping the whole workflow) ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: f
        # code=true when ANY changed file is NOT docs (same globs as the old paths-ignore). Fail-safe: if
        # the base sha is missing/unfetchable, run everything.
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$base" HEAD | grep -qvE '(\.md$|^docs/|^LICENSE$|^NOTICE$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Unit tests + type gates + lint (fast, Linux) — the REQUIRED check; runs on every push/PR ──
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # The app build (tsc -b) EXCLUDES src/mcp; typecheck:mcp is its own gate — CI must run it or an
      # MCP-layer type error passes `npm test` AND `npm run build` (see feedback_build_typechecks_tests_dont).
      - run: npm run typecheck:mcp
      - run: npm run lint

  # ── E2E tests (Playwright, Linux) — skipped on docs-only ─────────────
  e2e:
    needs: [test, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      # Real-Chrome rasterization smoke for get_slide_image (#109) lives HERE, in the NON-REQUIRED
      # e2e job, not in the required `test` job: its 30s browser-render deadline is nondeterministic
      # under CI load and would randomly redden every PR's required check (#281). Opt-in env unlocks
      # the `describe.skipIf(!REAL_BROWSER)` blocks (they skip in `test`); retry:2 absorbs the rare
      # timeout here. `!cancelled()` so a Playwright failure above doesn't hide this signal.
      - name: Real-browser rasterization smoke (non-required, #281)
        if: ${{ !cancelled() }}
        env:
          SLIDECRAFT_E2E_BROWSER: "1"
        run: npx vitest run tests/mcp-slide-image.test.ts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Linux compile smoke — skipped on docs-only ───────────────────────
  # Catches Rust / tauri-config breaks on PR without the expensive mac/Windows legs. The real
  # cross-OS installers are built in release.yml on a `v*` tag. (rust-cache is a future speedup —
  # skipped here to keep every Action SHA-pinned per the repo's security posture.)
  build:
    needs: [test, changes]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev \
            libssl-dev patchelf
      - run: npm ci
      - run: npm run build
      - name: Build Tauri app (Linux smoke — installers are release.yml)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
