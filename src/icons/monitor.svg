<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Monitor: Screen with bar chart inside -->
  <!-- Monitor screen (rounded rectangle) -->
  <rect x="10" y="8" width="44" height="32" rx="2" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Monitor stand (narrow neck) -->
  <line x1="30" y1="40" x2="34" y2="40" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="32" y1="40" x2="32" y2="46" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Monitor base -->
  <line x1="20" y1="46" x2="44" y2="46" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bar chart inside screen -->
  <!-- Left bar (short) -->
  <line x1="20" y1="32" x2="20" y2="28" stroke="#1E2761" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle-left bar (medium) -->
  <line x1="28" y1="32" x2="28" y2="22" stroke="#1E2761" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle-right bar (tall) -->
  <line x1="36" y1="32" x2="36" y2="16" stroke="#1E2761" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bar (medium-short) -->
  <line x1="44" y1="32" x2="44" y2="25" stroke="#1E2761" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
