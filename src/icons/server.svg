<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Server: Tall rectangle with 2 horizontal divider lines creating 3 bays -->
  <!-- Main body -->
  <rect x="18" y="8" width="28" height="48" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Horizontal divider line 1 (top bay) -->
  <line x1="18" y1="23" x2="46" y2="23" stroke="#1E2761" stroke-width="3" stroke-linecap="round"/>

  <!-- Horizontal divider line 2 (middle bay) -->
  <line x1="18" y1="38" x2="46" y2="38" stroke="#1E2761" stroke-width="3" stroke-linecap="round"/>

  <!-- LED indicator (small circle in bottom section) -->
  <circle cx="32" cy="49" r="2.5" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
