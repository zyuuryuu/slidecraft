<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Internet: Globe with equator line and meridian -->
  <!-- Outer circle (globe) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Equator (horizontal line) -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Meridian (vertical ellipse for 3D effect) -->
  <ellipse cx="32" cy="32" rx="10" ry="22" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
