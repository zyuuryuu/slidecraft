<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Load Balancer: Single input arrow splitting into 3 output arrows -->
  <!-- Input arrow (from top center) -->
  <path d="M 32 8 L 32 24 M 28 12 L 32 8 L 36 12" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Splitting point -->
  <circle cx="32" cy="32" r="3" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left output arrow -->
  <path d="M 24 40 L 14 54 M 12 52 L 14 54 L 16 52" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center output arrow -->
  <path d="M 32 35 L 32 54 M 28 50 L 32 54 L 36 50" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right output arrow -->
  <path d="M 40 40 L 50 54 M 48 52 L 50 54 L 52 52" fill="none" stroke="#1E2761" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
